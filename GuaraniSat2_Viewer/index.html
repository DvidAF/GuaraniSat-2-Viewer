<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUARANISAT-2</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #090d16; 
      color: white;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
      max-width: 380px;
      pointer-events: auto;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      color: white;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.14);
      transition: 0.25s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .bottom-info {
      position: absolute;
      left: 20px;
      bottom: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.88);
      pointer-events: auto;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
    }

    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 10, 20, 0.55);
      backdrop-filter: blur(6px);
      z-index: 20;
      transition: opacity 0.4s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 24px 28px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 220px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
    }

    .spinner {
      width: 46px;
      height: 46px;
      margin: 0 auto 16px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.18);
      border-top-color: white;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      font-size: 14px;
      color: rgba(255,255,255,0.92);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .card {
        max-width: 100%;
      }

      .controls {
        justify-content: flex-start;
      }

      .title {
        font-size: 22px;
      }

      .bottom-info {
        right: 20px;
        left: 20px;
        bottom: 16px;
        text-align: center;
      }

      button {
        flex: 1 1 auto;
      }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-box">
      <div class="spinner"></div>
      <div class="loader-text" id="loadingText">Cargando modelo...</div>
    </div>
  </div>

  <div class="overlay">
    <div class="topbar">
      <div class="card">
        <h1 class="title">GUARANISAT-2</h1>
        <p class="subtitle">
          El GuaraníSat-2 es un nanosatélite CubeSat 3U que marca un paso firme de Paraguay hacia su programa espacial.
        </p>
      </div>

      <div class="controls">
        <button id="rotateBtn">Auto rotación: ON</button>
        <button id="resetBtn">Reiniciar vista</button>
      </div>
    </div>

    <div class="bottom-info" id="statusBox">
      esperando carga...
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/libs/draco/');

    
    

    const scene = new THREE.Scene();
    
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true,
      logarithmicDepthBuffer: true 
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x223344, 0.8));

    const textureLoader = new THREE.TextureLoader();

    textureLoader.load('/space.jpeg', (texture) => {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      texture.colorSpace = THREE.SRGBColorSpace;

      scene.background = texture;
      scene.environment = texture; 
    });

    const mainLight = new THREE.DirectionalLight(0xffffff, 2.2);
    mainLight.position.set(-25, 20, 3);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    mainLight.shadow.camera.near = 0.5;
    mainLight.shadow.camera.far = 50;
    mainLight.shadow.camera.left = -10;
    mainLight.shadow.camera.right = 10;
    mainLight.shadow.camera.top = 10;
    mainLight.shadow.camera.bottom = -10;
    mainLight.shadow.bias = -0.0005;
    scene.add(mainLight);

    let model = null;

    let bgSphere;

    let initialPos = new THREE.Vector3();

    const gltfLoader = new GLTFLoader();
    gltfLoader.setDRACOLoader(dracoLoader);
    gltfLoader.load(
      '/GS2_C.glb', 
      (gltf) => {
      model = gltf.scene;

      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;

          if (child.material) {
            child.material.roughness = 0.1;
            child.material.metalness = 0.6;
          }
        }
      });
        

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());


      model.position.set(-center.x, -center.y, -center.z);
      
      
      const wrapper = new THREE.Group();
      wrapper.add(model);
      scene.add(wrapper);

      const toRad = (degrees) => degrees * (Math.PI / 180);
        wrapper.rotation.y = toRad(140); 

      

      const maxDim = Math.max(size.x, size.y, size.z);
      const fovRad = camera.fov * (Math.PI / 180);
      

      let cameraDistance = (maxDim / 2) / Math.tan(fovRad / 2) * 0.8; 

      camera.position.set(0, size.y * 0.3, cameraDistance);
      camera.lookAt(0, 0, 0);
      
      controls.target.set(0, 0, 0);
      controls.minDistance = maxDim * 0.2;
      controls.maxDistance = cameraDistance * 5;
      controls.update();
      initialPos.copy(camera.position);

      document.getElementById('loader').classList.add('hidden');
      document.getElementById('statusBox').textContent = 'GuaraniSat-2 cargado correctamente';
    }, 
    (xhr) => {
      const p = (xhr.loaded / xhr.total * 100).toFixed(0);
      document.getElementById('loadingText').textContent = `Cargando: ${p}%`;
    });

    document.getElementById('rotateBtn').addEventListener('click', (e) => {
      controls.autoRotate = !controls.autoRotate;
      e.target.textContent = `Auto rotación: ${controls.autoRotate ? 'ON' : 'OFF'}`;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      camera.position.copy(initialPos);
      controls.target.set(0, 0, 0);
      controls.update();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    (error) => {
      console.error('Error cargando el modelo:', error);
      document.getElementById('loadingText').textContent = 'Error al cargar el modelo';
      document.getElementById('statusBox').textContent = 'Estado: error de carga';
    }
  </script>
   
</body>
</html>
